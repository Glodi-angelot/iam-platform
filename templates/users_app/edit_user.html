{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">

        <a href="/users/" class="btn btn-outline-dark rounded-pill mb-4">
            <i class="bi bi-arrow-left"></i> Retour
        </a>

        <div class="iam-card">

            <h1 class="page-title mb-2">Modifier utilisateur</h1>
            <p class="text-muted mb-4">
                Mise à jour des informations et permissions.
            </p>

            <form method="POST">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Nom d’utilisateur</label>
                    <input type="text"
                           class="form-control form-control-lg"
                           value="{{ user_obj.username }}"
                           disabled>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           name="email"
                           value="{{ user_obj.email }}"
                           class="form-control form-control-lg">
                </div>

                <!-- Role -->
                <div class="mb-4">
                    <label class="form-label">Rôle</label>
                    <select name="role" class="form-select form-select-lg">
                        {% for role in roles %}
                            <option value="{{ role.id }}"
                                {% if profile.role and profile.role.id == role.id %}
                                    selected
                                {% endif %}
                            >
                                {{ role.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Toggles -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-check form-switch">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="is_active"
                                   {% if user_obj.is_active %}checked{% endif %}>
                            <label class="form-check-label">Compte actif</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check form-switch">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="is_staff"
                                   {% if user_obj.is_staff %}checked{% endif %}>
                            <label class="form-check-label">Staff</label>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary btn-lg rounded-pill px-4">
                    <i class="bi bi-check-circle"></i> Enregistrer
                </button>

            </form>
        </div>
    </div>
</div>

{% endblock %}
