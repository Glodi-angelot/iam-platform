{% extends 'base.html' %}

{% block content %}

<div class="login-iam-wrapper">
    <div class="login-iam-card iam-card">

        <div class="login-iam-header text-center">
            <div class="login-iam-icon mx-auto">
                <i class="bi bi-shield-lock-fill"></i>
            </div>

            <h1>Connexion IAM</h1>
            <p>Accès sécurisé à la plateforme de gestion des identités.</p>
        </div>

        {% if error %}
            <div class="alert alert-danger rounded-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="login-iam-form">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nom d’utilisateur</label>
                <div class="input-icon">
                    <i class="bi bi-person"></i>
                    <input 
                        type="text" 
                        name="username" 
                        class="form-control form-control-lg" 
                        placeholder="Entrez votre nom d’utilisateur"
                        required
                    >
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input 
                        type="password" 
                        name="password" 
                        id="passwordInput"
                        class="form-control form-control-lg" 
                        placeholder="Entrez votre mot de passe"
                        required
                    >

                    <button type="button" class="password-eye" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 btn-rounded login-btn">
                <i class="bi bi-box-arrow-in-right"></i> Se connecter
            </button>
        </form>

        <div class="login-iam-footer">
            <span>
                <i class="bi bi-shield-check"></i>
                Connexion journalisée pour audit et analyse Kibana.
            </span>
        </div>

    </div>
</div>

<style>
    .login-iam-wrapper {
        min-height: 72vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
    }

    .login-iam-card {
        width: min(100%, 500px);
        position: relative;
        overflow: hidden;
        padding: 36px;
    }

    .login-iam-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 6px;
        background: linear-gradient(90deg, #0f172a, #2563eb, #16a34a);
    }

    .login-iam-header {
        margin-bottom: 28px;
    }

    .login-iam-icon {
        width: 76px;
        height: 76px;
        border-radius: 24px;
        background: linear-gradient(135deg, #0f172a, #2563eb);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 18px;
        box-shadow: 0 18px 36px rgba(37, 99, 235, 0.28);
    }

    .login-iam-header h1 {
        font-size: clamp(28px, 5vw, 40px);
        font-weight: 900;
        color: #0f172a;
        margin-bottom: 8px;
    }

    .login-iam-header p {
        color: #64748b;
        margin: 0;
        line-height: 1.6;
    }

    .login-iam-form .form-label {
        font-weight: 800;
        color: #0f172a;
    }

    .input-icon {
        position: relative;
    }

    .input-icon > i {
        position: absolute;
        top: 50%;
        left: 18px;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 18px;
        z-index: 2;
    }

    .input-icon .form-control {
        padding-left: 52px;
        border-radius: 18px;
        border-color: #e2e8f0;
        min-height: 56px;
    }

    .input-icon .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .password-eye {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: #64748b;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .password-eye:hover {
        background: #f1f5f9;
        color: #0f172a;
    }

    #passwordInput {
        padding-right: 58px;
    }

    .login-btn {
        min-height: 56px;
        font-weight: 800;
        box-shadow: 0 16px 32px rgba(37, 99, 235, 0.22);
    }

    .login-btn:hover {
        transform: translateY(-2px);
    }

    .login-iam-footer {
        margin-top: 24px;
        padding: 14px;
        border-radius: 18px;
        background: #f8fafc;
        color: #64748b;
        font-size: 14px;
        text-align: center;
    }

    .login-iam-footer i {
        color: #2563eb;
    }

    @media (max-width: 576px) {
        .login-iam-card {
            padding: 26px;
        }

        .login-iam-icon {
            width: 66px;
            height: 66px;
            font-size: 30px;
        }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const passwordInput = document.getElementById("passwordInput");
        const togglePassword = document.getElementById("togglePassword");

        if (passwordInput && togglePassword) {
            togglePassword.addEventListener("click", function () {
                const hidden = passwordInput.getAttribute("type") === "password";
                passwordInput.setAttribute("type", hidden ? "text" : "password");

                const icon = togglePassword.querySelector("i");
                if (icon) {
                    icon.className = hidden ? "bi bi-eye-slash" : "bi bi-eye";
                }
            });
        }
    });
</script>

{% endblock %}
