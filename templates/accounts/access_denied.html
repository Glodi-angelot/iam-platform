{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center align-items-center" style="min-height: 65vh;">
    <div class="col-md-7 col-lg-6">
        <div class="iam-card text-center">

            <div class="icon-box bg-danger mx-auto mb-4">
                <i class="bi bi-shield-x"></i>
            </div>

            <h1 class="page-title mb-3">Accès refusé</h1>

            <p class="text-muted fs-5">
                Vous n’avez pas les droits nécessaires pour accéder à cette ressource.
            </p>

            <div class="alert alert-warning mt-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
                Cette tentative d’accès a été enregistrée dans les journaux d’audit.
            </div>

            <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">
                <a href="/" class="btn btn-outline-dark rounded-pill px-4">
                    <i class="bi bi-house-door"></i> Accueil
                </a>

                {% if user.is_authenticated %}
                    <a href="/dashboard/" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                {% else %}
                    <a href="/login/" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-box-arrow-in-right"></i> Connexion
                    </a>
                {% endif %}
            </div>

        </div>
    </div>
</div>

{% endblock %}
