{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">

        <a href="/roles/" class="btn btn-outline-dark rounded-pill mb-4">
            <i class="bi bi-arrow-left"></i> Retour aux rôles
        </a>

        <div class="iam-card role-create-card">
            <div class="role-create-header mb-4">
                <div class="role-create-icon">
                    <i class="bi bi-person-badge-fill"></i>
                </div>

                <div>
                    <h1 class="page-title mb-2">Créer un rôle</h1>
                    <p class="text-muted mb-0">Définissez un rôle personnalisé et ses permissions.</p>
                </div>
            </div>

            <div class="alert alert-primary border-0 rounded-4 mb-4">
                <i class="bi bi-info-circle-fill"></i>
                La création du rôle sera enregistrée dans les journaux d’audit.
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nom du rôle</label>
                    <input type="text" name="name" class="form-control form-control-lg" placeholder="Ex : MANAGER" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control form-control-lg" rows="3" placeholder="Décrivez le rôle..."></textarea>
                </div>

                <h5 class="fw-bold mb-3">Permissions</h5>

                <div class="permission-grid">
                    <label class="permission-box">
                        <input type="checkbox" name="can_manage_users">
                        <span>
                            <strong>Gérer utilisateurs</strong>
                            <small>Créer, consulter et supprimer des comptes.</small>
                        </span>
                    </label>

                    <label class="permission-box">
                        <input type="checkbox" name="can_manage_roles">
                        <span>
                            <strong>Gérer rôles</strong>
                            <small>Créer et administrer les rôles IAM.</small>
                        </span>
                    </label>

                    <label class="permission-box">
                        <input type="checkbox" name="can_view_logs">
                        <span>
                            <strong>Voir logs</strong>
                            <small>Consulter les journaux d’audit.</small>
                        </span>
                    </label>

                    <label class="permission-box">
                        <input type="checkbox" name="can_view_kibana">
                        <span>
                            <strong>Accès Kibana</strong>
                            <small>Accéder à l’espace d’analyse Kibana.</small>
                        </span>
                    </label>
                </div>

                <div class="mt-4 d-flex justify-content-end">
                    <button class="btn btn-primary btn-lg rounded-pill px-4" type="submit">
                        <i class="bi bi-check-circle"></i> Créer le rôle
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .role-create-card {
        position: relative;
        overflow: hidden;
    }

    .role-create-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 6px;
        background: linear-gradient(90deg, #2563eb, #0f172a, #16a34a);
    }

    .role-create-header {
        display: flex;
        align-items: center;
        gap: 18px;
    }

    .role-create-icon {
        width: 70px;
        height: 70px;
        border-radius: 22px;
        background: linear-gradient(135deg, #0f172a, #2563eb);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        flex: 0 0 auto;
    }

    .form-label {
        font-weight: 800;
        color: #0f172a;
    }

    .form-control {
        border-radius: 18px;
        border-color: #e2e8f0;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .permission-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    .permission-box {
        display: flex;
        gap: 12px;
        padding: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        background: #f8fafc;
        cursor: pointer;
    }

    .permission-box:hover {
        border-color: #2563eb;
        background: #eff6ff;
    }

    .permission-box input {
        margin-top: 5px;
    }

    .permission-box strong {
        display: block;
        color: #0f172a;
    }

    .permission-box small {
        color: #64748b;
        line-height: 1.5;
    }

    @media (max-width: 768px) {
        .permission-grid {
            grid-template-columns: 1fr;
        }

        .role-create-header {
            flex-direction: column;
            align-items: flex-start;
        }

        button[type="submit"] {
            width: 100%;
        }
    }
</style>

{% endblock %}
